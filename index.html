<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الرواية - الصفحة الرئيسية</title>
    
    <link rel="stylesheet" href="style.css">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore-compat.js"></script>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">🔮 عالم الرواية</a>
        <div class="nav-links">
            <a href="#chapters-section">الفهرس</a>
        </div>
    </nav>

    <div class="container">
        <header style="text-align: center; margin-bottom: 40px; margin-top: 20px;">
            <h1>مرحباً بك في عالم الفانتازيا</h1>
            <p style="color: var(--text-muted); margin-top: 10px;">تابع رحلة الأبطال، واكتشف قدراتهم، وشاهد تحركاتهم عبر الأدوات التفاعلية.</p>
        </header>

        <div style="text-align: center; margin: 30px 0;">
            <button id="open-map-btn" style="background-color: var(--accent-color); color: white; padding: 14px 28px; border: none; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: background 0.2s;">
                🗺️ فتح خريطة العالم التفاعلية
            </button>
        </div>

        <div id="map-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.85); z-index: 9999; justify-content: center; align-items: center; padding: 15px;">
            <div style="background-color: var(--surface-color); width: 100%; max-width: 750px; padding: 25px; border-radius: 12px; position: relative; border: 1px solid var(--border-color);">
                <span id="close-map-btn" style="position: absolute; top: 10px; left: 20px; color: var(--text-muted); font-size: 30px; cursor: pointer; transition: color 0.2s;">&times;</span>
                <h3 style="margin-bottom: 20px; text-align: center; color: #fff;">📍 خريطة تحركات الشخصيات</h3>
                
                <div id="map" style="height: 400px; width: 100%;"></div>
            </div>
        </div>

        <section id="chapters-section">
            <h2>📖 فهرس الفصول</h2>
            <ul class="chapters-list" id="chapters-loading-zone">
                <p style="text-align: center; color: var(--text-muted); padding: 20px;">جاري الاتصال بقاعدة البيانات وتحميل الفصول...</p>
            </ul>
        </section>
    </div>

    <script>
        /* ==========================================================================
           1. إعداد وتفعيل Firebase (Firestore)
           ========================================================================== */
        // ضع هنا بيانات مشروعك الحقيقية التي تجلبها من إعدادات Firebase Console
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        
        // بدء تشغيل الخدمة
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // جلب مكان عرض الفصول في الصفحة
        const listContainer = document.getElementById('chapters-loading-zone');

        // استدعاء البيانات من كولكشن "chapters" وترتيبها حسب حقل "order" تصاعدياً
        db.collection("chapters").orderBy("order").get().then((querySnapshot) => {
            listContainer.innerHTML = ""; // تنظيف مساحة العرض من نصوص التحميل
            
            if (querySnapshot.empty) {
                listContainer.innerHTML = `<p style="text-align: center; color: var(--text-muted); padding: 20px;">لا توجد فصول مرفوعة حالياً.</p>`;
                return;
            }

            querySnapshot.forEach((doc) => {
                const data = doc.data();
                const li = document.createElement('li');
                // نمرر الـ Document ID (مثل ch1, ch2) عبر الرابط لتقرأه صفحة القراءة
                li.innerHTML = `<a href="chapter.html?id=${doc.id}">${data.title}</a>`;
                listContainer.appendChild(li);
            });
        }).catch(err => {
            listContainer.innerHTML = `<p style="color:#ef4444; text-align:center; padding:20px;">حدث خطأ أثناء جلب الفصول: ${err.message}</p>`;
        });

        /* ==========================================================================
           2. تشغيل وإعداد الخريطة التفاعلية (Leaflet.js)
           ========================================================================== */
        var map = L.map('map').setView([0, 0], 1);
        
        // استبدل هذا الرابط لاحقاً برابط صورة خريطة عالمك الخاصة المرفوعة على GitHub
        L.imageOverlay('https://www.w3schools.com/w3images/photographer.jpg', [[-100, -100], [100, 100]]).addTo(map);

        // علامات الأماكن الافتراضية (تستطيع التعديل عليها أو جلبها من Firestore لاحقاً)
        L.marker([10, 20]).addTo(map).bindPopup("<b>🏰 قلعة التنانين:</b> يتواجد هنا البطل حالياً بقوة 5000 XP");
        L.marker([-20, -30]).addTo(map).bindPopup("<b>🌲 غابة الخلود:</b> نقطة ظهور الوحوش السحرية");

        /* ==========================================================================
           3. أزرار التحكم بالنافذة المنبثقة (Modal Toggle)
           ========================================================================== */
        const modal = document.getElementById('map-modal');
        const openBtn = document.getElementById('open-map-btn');
        const closeBtn = document.getElementById('close-map-btn');

        // فتح النافذة وإعادة ضبط حجم الخريطة لتفادي مشاكل العرض والتداخل
        openBtn.onclick = () => {
            modal.style.display = 'flex';
            setTimeout(() => { map.invalidateSize(); }, 250); 
        };

        // إغلاق عند الضغط على علامة X
        closeBtn.onclick = () => { modal.style.display = 'none'; };
        closeBtn.onmouseenter = () => { closeBtn.style.color = '#fff'; };
        closeBtn.onmouseleave = () => { closeBtn.style.color = 'var(--text-muted)'; };

        // إغلاق النافذة إذا ضغط المستخدم في أي مكان خارج إطار الخريطة
        window.onclick = (e) => { if (e.target == modal) modal.style.display = 'none'; };
    </script>
</body>
</html>
