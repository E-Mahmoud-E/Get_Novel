<div id="map" style="height: 400px; width: 100%;"></div>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // تشغيل الخريطة وصورة عالم روايتك
    var map = L.map('map').setView([0, 0], 1);
    L.imageOverlay('world-map.jpg', [[-100, -100], [100, 100]]).addTo(map);

    // إضافة نقاط تفاعلية لأماكن الشخصيات
    L.marker([10, 20]).addTo(map).bindPopup("<b>قلعة التنانين:</b> يتواجد هنا البطل حالياً بقوة 5000 XP");
</script>
